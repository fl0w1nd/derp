name: Build and Push DERP Docker Image

run-name: Build and Push DERP Image ${{ github.event.inputs.version || '(auto-latest)' }}

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.56.0). Leave blank to use the latest from Go Proxy.'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: fl0w1nd/derper

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      prev_tag: ${{ steps.prev_version.outputs.tag }}
      should_build: ${{ steps.check_version.outputs.should_build }}
    steps:
      - name: 🔍 Determine target version
        id: get_version
        run: |
          USER_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$USER_VERSION" ]; then
            echo "✅ Using user-provided version: ${USER_VERSION}"
            echo "version=${USER_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Fetching latest version from Go Proxy..."
            LATEST_VERSION=$(curl -s "https://proxy.golang.org/tailscale.com/@latest" | jq -r .Version | sed 's/^v//')
            if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
              echo "❌ Failed to fetch latest version"
              exit 1
            fi
            echo "✅ Latest version: ${LATEST_VERSION}"
            echo "version=${LATEST_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Check if version already exists
        id: check_version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "⏭️ Version v${VERSION} already exists, skipping build"
            echo "should_build=false" >> $GITHUB_OUTPUT
          else
            echo "🆕 Version v${VERSION} is new, proceeding with build"
            echo "should_build=true" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Get previous version for changelog
        if: steps.check_version.outputs.should_build == 'true'
        id: prev_version
        run: |
          PREV_TAG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
          if [ "$PREV_TAG" = "null" ] || [ -z "$PREV_TAG" ]; then
            echo "ℹ️ No previous release found"
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "✅ Previous release: ${PREV_TAG}"
            echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          fi

  build:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Prepare
        run: |
          platform=${{ matrix.platform }}
          echo "PLATFORM_PAIR=${platform//\//-}" >> $GITHUB_ENV

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfile
          platforms: ${{ matrix.platform }}
          build-args: |
            DERP_VERSION=v${{ needs.check.outputs.version }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          outputs: type=image,push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_PAIR }}
          cache-to: type=gha,scope=${{ env.PLATFORM_PAIR }},mode=max

      - name: Export digest
        run: |
          mkdir -p ${{ runner.temp }}/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_PAIR }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    needs: [check, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: 🔑 Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: ⚙️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🚀 Create manifest list and push
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          docker buildx imagetools create \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest \
            $(printf '${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha256:%s ' \
              $(ls ${{ runner.temp }}/digests/))

      - name: 📝 Inspect image
        run: |
          docker buildx imagetools inspect ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.check.outputs.version }}

      - name: 📝 Generate release body
        id: release_body
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          PREV_TAG="${{ needs.check.outputs.prev_tag }}"

          {
            echo "body<<BODY_EOF"
            echo "## DERP Server v${VERSION}"
            echo ""
            echo "**Docker image**"
            echo ""
            echo "\`\`\`bash"
            echo "docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
            echo "\`\`\`"
            echo ""
            echo "### derper 源码变更"
            echo ""
            if [ -n "$PREV_TAG" ]; then
              echo "- [完整变更](https://github.com/tailscale/tailscale/compare/${PREV_TAG}...v${VERSION})"
              echo "- [derper 提交历史](https://github.com/tailscale/tailscale/commits/v${VERSION}/cmd/derper)"
            else
              echo "- [derper 提交历史](https://github.com/tailscale/tailscale/commits/v${VERSION}/cmd/derper)"
            fi
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: 📦 Create GitHub Release
        uses: softprops/action-gh-release@v2.5.0
        with:
          tag_name: v${{ needs.check.outputs.version }}
          name: v${{ needs.check.outputs.version }}
          body: ${{ steps.release_body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Print summary
        run: |
          VERSION="${{ needs.check.outputs.version }}"
          echo "🎉 Successfully built and released v${VERSION}"
          echo "   - Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
          echo "   - Release: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
