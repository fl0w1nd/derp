name: Build and Push DERP Docker Image

run-name: Build and Push DERP Image ${{ github.event.inputs.version || '(auto-latest)' }}

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:
    inputs:
      version:
        description: 'Image version (e.g., 1.56.0). Leave blank to use the latest from Go Proxy.'
        required: false
        default: ''

env:
  REGISTRY: docker.io
  IMAGE_NAME: fl0w1nd/derper

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: 🔍 Determine target version
        id: get_version
        run: |
          USER_VERSION="${{ github.event.inputs.version }}"
          if [ -n "$USER_VERSION" ]; then
            echo "✅ Using user-provided version: ${USER_VERSION}"
            echo "version=${USER_VERSION}" >> $GITHUB_OUTPUT
          else
            echo "ℹ️ Fetching latest version from Go Proxy..."
            LATEST_VERSION=$(curl -s "https://proxy.golang.org/tailscale.com/@latest" | jq -r .Version | sed 's/^v//')
            if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" = "null" ]; then
              echo "❌ Failed to fetch latest version"
              exit 1
            fi
            echo "✅ Latest version: ${LATEST_VERSION}"
            echo "version=${LATEST_VERSION}" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Check if version already exists
        id: check_version
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v${VERSION}")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "⏭️ Version v${VERSION} already exists, skipping build"
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "🆕 Version v${VERSION} is new, proceeding with build"
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: 🔍 Get previous version for changelog
        if: steps.check_version.outputs.exists == 'false'
        id: prev_version
        run: |
          PREV_TAG=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/latest" | jq -r .tag_name)
          if [ "$PREV_TAG" = "null" ] || [ -z "$PREV_TAG" ]; then
            echo "ℹ️ No previous release found"
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "✅ Previous release: ${PREV_TAG}"
            echo "tag=${PREV_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: ⚙️ Set up QEMU
        if: steps.check_version.outputs.exists == 'false'
        uses: docker/setup-qemu-action@v3

      - name: ⚙️ Set up Docker Buildx
        if: steps.check_version.outputs.exists == 'false'
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Log in to Docker Hub
        if: steps.check_version.outputs.exists == 'false'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🚀 Build and push Docker image
        if: steps.check_version.outputs.exists == 'false'
        id: build_and_push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            DERP_VERSION=v${{ steps.get_version.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.get_version.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 📝 Generate release body
        if: steps.check_version.outputs.exists == 'false'
        id: release_body
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          PREV_TAG="${{ steps.prev_version.outputs.tag }}"
          BODY="## DERP Server v${VERSION}

          **Docker image**

          \`\`\`bash
          docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}
          \`\`\`

          ### derper 源码变更

          "
          if [ -n "$PREV_TAG" ]; then
            BODY="${BODY}- [完整变更](https://github.com/tailscale/tailscale/compare/${PREV_TAG}...v${VERSION})
          - [derper 变更](https://github.com/tailscale/tailscale/compare/${PREV_TAG}...v${VERSION} \"筛选 cmd/derper 路径查看 derper 相关改动\")
          - [derper 提交历史](https://github.com/tailscale/tailscale/commits/v${VERSION}/cmd/derper)"
          else
            BODY="${BODY}- [derper 提交历史](https://github.com/tailscale/tailscale/commits/v${VERSION}/cmd/derper)"
          fi

          # 写入多行内容到 GITHUB_OUTPUT
          {
            echo "body<<BODY_EOF"
            echo "$BODY"
            echo "BODY_EOF"
          } >> $GITHUB_OUTPUT

      - name: 📦 Create GitHub Release
        if: steps.check_version.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: v${{ steps.get_version.outputs.version }}
          body: ${{ steps.release_body.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 📝 Print summary
        run: |
          VERSION="${{ steps.get_version.outputs.version }}"
          if [ "${{ steps.check_version.outputs.exists }}" = "true" ]; then
            echo "⏭️ v${VERSION} already up to date, nothing to do"
          else
            echo "🎉 Successfully built and released v${VERSION}"
            echo "   - Image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${VERSION}"
            echo "   - Release: https://github.com/${{ github.repository }}/releases/tag/v${VERSION}"
          fi
